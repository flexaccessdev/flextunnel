name: Test (Manual)

# Standalone version of the release workflow's test steps. Shares the release
# jobs' Rust caches (same rust-cache shared-key per target), so it can verify
# platforms without cutting a release — notably flextunnel-desktop on Windows,
# which release only builds for stable releases and never tests on its own.
on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            # flextunnel-desktop is macOS/Windows only (tray + keychain backends).
            packages: -p flextunnel-cli -p flextunnel-agent
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            packages: -p flextunnel-cli -p flextunnel-agent
          - os: macos-latest
            target: aarch64-apple-darwin
            packages: -p flextunnel-cli -p flextunnel-agent -p flextunnel-desktop
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            packages: -p flextunnel-cli -p flextunnel-agent -p flextunnel-desktop
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          # Must stay in sync with the release workflow's build jobs so both
          # workflows restore/populate the same cache.
          shared-key: release-${{ matrix.target }}

      - name: Test Release
        run: |
          cargo test --release ${{ matrix.packages }} --target ${{ matrix.target }}

      # Desktop installer packaging — same commands as the release workflow, so
      # the .app/.msi build is verifiable without cutting a release. The
      # resulting installers are uploaded as plain workflow artifacts.
      - uses: cargo-bins/cargo-binstall@main
        if: runner.os == 'macOS' || runner.os == 'Windows'

      - name: Package desktop app (.app, unsigned)
        if: runner.os == 'macOS'
        run: |
          cargo binstall -y --force cargo-packager@0.11.8
          cargo build --release -p flextunnel-desktop --target ${{ matrix.target }}
          cargo packager --release -p flextunnel-desktop --formats app --target ${{ matrix.target }}
          ditto -c -k --keepParent target/${{ matrix.target }}/release/flextunnel.app flextunnel-desktop-macos-arm64.app.zip

      - name: Package desktop installer (.msi, unsigned)
        if: runner.os == 'Windows'
        run: |
          cargo binstall -y --force cargo-packager@0.11.8
          cargo build --release -p flextunnel-desktop --target ${{ matrix.target }}
          cargo packager --release -p flextunnel-desktop --formats wix --target ${{ matrix.target }}
          Move-Item target/${{ matrix.target }}/release/*.msi flextunnel-desktop-windows-amd64.msi

      - uses: actions/upload-artifact@v4
        if: runner.os == 'macOS' || runner.os == 'Windows'
        with:
          name: desktop-${{ matrix.target }}
          path: flextunnel-desktop-*
